name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      LLM_API_KEY: "test-key"
      DIFY_API_KEY: "test-key"
      EMBEDDINGS_API_KEY: "test-key"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest

      - name: Report Audit Gate
        run: |
          python scripts/run_business_report_audit.py \
            --report-md tests/fixtures/reports/sample_report_ok.md \
            --timing-json tests/fixtures/reports/sample_timing_ok.json \
            --max-rounds 1 \
            --no-auto-fix

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
