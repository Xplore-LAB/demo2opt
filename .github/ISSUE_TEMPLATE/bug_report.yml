name: Bug report
description: 报告一个可复现的问题
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供可复现信息。
  - type: input
    id: summary
    attributes:
      label: 问题摘要
      placeholder: 一句话描述问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      placeholder: OS / Python / Node / 分支或提交号
