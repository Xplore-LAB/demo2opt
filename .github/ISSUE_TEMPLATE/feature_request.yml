name: Feature request
description: 提议一个新功能或改进
labels: [enhancement]
body:
  - type: input
    id: summary
    attributes:
      label: 功能摘要
      placeholder: 一句话说明要做什么
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 现有问题
      placeholder: 当前痛点是什么
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      placeholder: 你的方案、替代方案与权衡
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      placeholder: 对接口、配置、前端、测试的影响
